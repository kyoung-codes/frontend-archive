<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lotto-picker</title>
</head>

<body>

  <article class="lotto">
    <header class="lotto__title">
      <h1>로또 번호 뽑기</h1>
      <p>버튼을 클릭하면 행운의 번호가 뽑혀요!</p>
    </header>

    <div class="lotto-machine">
      <div class="lotto-glass">
        <span class="ball ball-1">8</span>
        <span class="ball ball-2">17</span>
        <span class="ball ball-3">23</span>
        <span class="ball ball-4">4</span>
        <span class="ball ball-5">31</span>
        <span class="ball ball-6">12</span>
        <span class="ball ball-7">7</span>
        <span class="ball ball-8">26</span>
      </div>
    </div>


  </article>

</body>

</html>
