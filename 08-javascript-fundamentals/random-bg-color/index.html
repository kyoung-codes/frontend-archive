<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 배경색 버튼</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background-color: #ffffff;
      color: #1f2937;
    }

    .color-card {
      padding: 40px 32px;
      text-align: center;
      background-color: rgba(255, 255, 255, 0.65);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
    }

    .color-card h1 {
      margin: 0 0 20px;
      font-size: 28px;
    }

    .color-code {
      margin: 0 0 28px;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .color-button {
      border: 0;
      padding: 14px 24px;
      border-radius: 999px;
      background-color: #222;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    .color-button:hover {
      background-color: #444;
    }
  </style>

</head>

<body>
  <main class="color-app">
    <section class="color-card">
      <h1>랜덤 색 변경</h1>
      <p class="color-code">#ffffff</p>
      <button type="button" class="color-button">change</button>
    </section>
  </main>

  <script>
    function randomColor() {
      const hex = Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, "0");
      return `#${hex}`;
    }

    const bg = document.querySelector("body");
    const btn = document.querySelector(".color-button");
    const colorCode = document.querySelector(".color-code");

    btn.addEventListener('click', () => {
      const color = randomColor();
      bg.style.backgroundColor = color;
      colorCode.textContent = color;
    })
  </script>
</body>

</html>
